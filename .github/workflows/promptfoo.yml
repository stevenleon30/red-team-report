name: Promptfoo Red Team

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - attacks/prompt-injection.yaml
          - attacks/jailbreaks.yaml
          - attacks/scope-boundary.yaml

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Promptfoo eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx promptfoo eval --config ${{ matrix.config }}